<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Comptes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- MAIN PANEL (left/center) -->
    <main class="main-panel" id="main-panel">
        <div class="main-placeholder" id="main-placeholder">
            <div class="placeholder-icon">⬡</div>
            <h2>Sélectionnez un compte</h2>
            <p>Cliquez sur un compte dans la barre latérale pour afficher son tableau de bord.</p>
        </div>
    </main>

    <!-- SIDEBAR (right) -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">◈</span>
            <h1>Mes Comptes</h1>
        </div>

        <!-- Global stats -->
        <div class="sidebar-global">
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Revenus</span>
                <span class="sidebar-global-amount rev" id="global-revenus">—</span>
            </div>
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Dépenses</span>
                <span class="sidebar-global-amount dep" id="global-depenses">—</span>
            </div>
            <div class="sidebar-global-divider"></div>
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Écart</span>
                <span class="sidebar-global-amount" id="global-ecart">—</span>
            </div>
        </div>

        <!-- Account list -->
        <nav class="account-list" id="account-list">
            <div class="account-list-loading">Chargement…</div>
        </nav>
    </aside>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Modifier le compte</h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <label>
                    <span>Nom du compte</span>
                    <input type="text" id="edit-name" placeholder="Nom du compte">
                </label>
                <label>
                    <span>Devise</span>
                    <input type="text" id="edit-devise" placeholder="CHF, EUR, USD…" maxlength="5">
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="modal-cancel">Annuler</button>
                <button class="btn-primary" id="modal-save">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
