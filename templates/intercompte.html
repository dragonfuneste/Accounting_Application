<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virement intercompte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu_compte.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/intercompte.css') }}">
</head>
<body>

    <main class="main-panel" id="main-panel">

        <!-- HEADER -->
        <div class="ic-header">
            <button class="ic-back-btn" id="ic-back">← Retour</button>
            <div class="ic-header-title">
                <h2>Virement intercompte</h2>
                <div class="ic-accounts-pill">
                    <span id="ic-src-name">—</span>
                    <span class="ic-arrow">⇄</span>
                    <span id="ic-dest-name">—</span>
                </div>
            </div>
        </div>

        <!-- CONTENT : 3 zones -->
        <div class="ic-content">

            <!-- COLONNE GAUCHE : formulaire -->
            <section class="ic-section ic-form-section">
                <h3 class="ic-section-title">Nouveau virement</h3>
                <div class="virement-form">

                    <div class="vform-row">
                        <label class="vform-label">Compte source</label>
                        <div class="vform-source-name" id="ic-form-src">—</div>
                    </div>

                    <div class="vform-row">
                        <label class="vform-label">Compte destinataire</label>
                        <select class="vform-select" id="ic-dest-select">
                            <option value="">Choisir…</option>
                        </select>
                    </div>

                    <div class="vform-row">
                        <label class="vform-label">Date</label>
                        <input class="vform-input" type="date" id="ic-date">
                    </div>

                    <div class="vform-row">
                        <label class="vform-label">Montant envoyé</label>
                        <div class="vform-amount-wrap">
                            <input class="vform-input vform-amount" type="number" id="ic-valeur-src" min="0.01" step="0.01" placeholder="0.00">
                            <span class="vform-devise" id="ic-devise-src">—</span>
                        </div>
                    </div>

                    <div class="vform-row" id="ic-row-dest-amount" style="display:none">
                        <label class="vform-label">Montant reçu</label>
                        <div class="vform-amount-wrap">
                            <input class="vform-input vform-amount" type="number" id="ic-valeur-dest" min="0.01" step="0.01" placeholder="0.00">
                            <span class="vform-devise vform-devise-dest" id="ic-devise-dest">—</span>
                        </div>
                    </div>

                    <div class="vform-row">
                        <label class="vform-label">Commentaire <span class="vform-optional">(optionnel)</span></label>
                        <input class="vform-input" type="text" id="ic-commentaire" placeholder="Ex: loyer, remboursement…">
                    </div>

                    <div class="vform-actions">
                        <button class="btn-primary vform-submit" id="ic-submit">Valider le virement</button>
                    </div>
                </div>
            </section>

            <!-- COLONNE DROITE : historique + graphique fixe en bas -->
            <section class="ic-section ic-right-section">

                <div class="ic-history-block">
                    <h3 class="ic-section-title">Historique</h3>
                    <div class="ic-history-list" id="ic-history-list">
                        <div class="ic-history-loading">Chargement…</div>
                    </div>
                </div>

                <div class="ic-chart-block">
                    <h3 class="ic-section-title">Solde cumulé entre ces comptes</h3>
                    <div class="ic-chart-wrap">
                        <canvas id="ic-chart"></canvas>
                        <div class="ic-chart-empty" id="ic-chart-empty">Sélectionnez un compte destinataire</div>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">◈</span>
            <h1>Mes Comptes</h1>
            <div class="sidebar-header-actions">
                <button class="btn-icon" id="btn-add-compte" title="Ajouter">+</button>
                <button class="btn-icon btn-icon-danger" id="btn-delete-compte" disabled>−</button>
            </div>
        </div>
        <div class="sidebar-global">
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Revenus</span>
                <span class="sidebar-global-amount rev" id="global-revenus">—</span>
            </div>
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Dépenses</span>
                <span class="sidebar-global-amount dep" id="global-depenses">—</span>
            </div>
            <div class="sidebar-global-divider"></div>
            <div class="sidebar-global-row">
                <span class="sidebar-global-label">Écart</span>
                <span class="sidebar-global-amount" id="global-ecart">—</span>
            </div>
        </div>
        <nav class="account-list" id="account-list">
            <div class="account-list-loading">Chargement…</div>
        </nav>
    </aside>

    <!-- Modales -->
    <div class="modal-overlay" id="add-overlay">
        <div class="modal">
            <div class="modal-header"><h3>Nouveau compte</h3><button class="modal-close" id="add-close">✕</button></div>
            <div class="modal-body">
                <label><span>Nom</span><input type="text" id="add-name" placeholder="Ex: Compte Épargne"></label>
                <label><span>Devise</span><input type="text" id="add-devise" maxlength="5" value="EUR"></label>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="add-cancel">Annuler</button>
                <button class="btn-primary" id="add-save">Créer</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="edit-overlay">
        <div class="modal">
            <div class="modal-header"><h3>Modifier le compte</h3><button class="modal-close" id="edit-close">✕</button></div>
            <div class="modal-body">
                <label><span>Nom</span><input type="text" id="edit-name"></label>
                <label><span>Devise</span><input type="text" id="edit-devise" maxlength="5"></label>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="edit-cancel">Annuler</button>
                <button class="btn-primary" id="edit-save">Enregistrer</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="delete-overlay">
        <div class="modal modal-danger">
            <div class="modal-header"><h3>Supprimer</h3><button class="modal-close" id="delete-close">✕</button></div>
            <div class="modal-body"><p id="delete-warning-text"></p></div>
            <div class="modal-footer">
                <button class="btn-secondary" id="delete-cancel">Annuler</button>
                <button class="btn-danger" id="delete-confirm">Supprimer</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/menu_compte.js') }}"></script>
    <script src="{{ url_for('static', filename='js/intercompte.js') }}"></script>
</body>
</html>
