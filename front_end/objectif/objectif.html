<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets — Gestion des objectifs</title>
    <link rel="stylesheet" href="/front_end/objectif/objectif.css">
    <link rel="stylesheet" href="/front_end/index/index.css">
    <link rel="stylesheet" href="/front_end/_template/global.css">
</head>
<body>
<div class="app-shell">

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-brand">Application compte V4</div>
        <span class="topbar-tag">Gestion des projets</span>
    </header>

    <main class="main-content">

        <!-- ── KPI strip ───────────────────────────────────────────────────── -->
        <div class="kpi-strip">
            <div class="kpi-card">
                <span class="kpi-label">Épargné total</span>
                <span class="kpi-value positive" id="kpiEpargne">—</span>
                <span class="kpi-sub">tous projets actifs</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">Dépensé total</span>
                <span class="kpi-value negative" id="kpiDepense">—</span>
                <span class="kpi-sub">tous projets actifs</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">Objectif total</span>
                <span class="kpi-value" id="kpiObjectif">—</span>
                <span class="kpi-sub" id="kpiNbProjects">— projets</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">Restant</span>
                <span class="kpi-value" id="kpiRestant">—</span>
                <span class="kpi-sub">à financer</span>
            </div>
        </div>

        <!-- ── Toolbar ────────────────────────────────────────────────────── -->
        <div class="toolbar">
            <span class="toolbar-title">Projets — triés par priorité</span>
            <button class="btn btn-primary" id="btnNewProject">＋ Nouveau projet</button>
            <button class="btn btn-danger" id="btnDeleteProject" disabled>✕ Supprimer</button>
        </div>

        <!-- ── Sticky notes row ────────────────────────────────────────────── -->
        <div class="sticky-row" id="stickyRow"></div>

        <!-- ── Detail panel ─────────────────────────────────────────────────── -->
        <div class="detail-panel" id="detailPanel" style="display:none;">

            <div class="detail-header">
                <div class="detail-header-left">
                    <span class="detail-logo" id="detailLogo"></span>
                    <div>
                        <div class="detail-name" id="detailName"></div>
                        <div class="detail-but" id="detailBut"></div>
                    </div>
                </div>
                <div class="detail-header-right">
                    <span class="detail-deadline" id="detailDeadline"></span>
                    <button class="btn btn-primary btn-sm" id="btnNewStep">＋ Étape</button>
                </div>
            </div>

            <div class="progress-row">
                <div class="progress-label">
                    <span id="detailProgress">0%</span>
                    <span id="detailAmounts" class="progress-amounts"></span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="detailProgressFill"></div>
                </div>
            </div>

            <div class="steps-grid" id="stepsGrid"></div>

        </div>

    </main>
</div>

<!-- ── Modal nouveau projet ──────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalProject" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Nouveau projet</span>
            <button class="modal-close" onclick="closeModal('modalProject')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Logo</label>
                <input type="text" id="newObjLogo" class="form-input" value="🎯" maxlength="2">
            </div>
            <div class="form-group">
                <label class="form-label">Nom *</label>
                <input type="text" id="newObjName" class="form-input" placeholder="Ex : Voyage au Japon">
            </div>
            <div class="form-group">
                <label class="form-label">But</label>
                <input type="text" id="newObjBut" class="form-input" placeholder="Description courte">
            </div>
            <div class="form-group">
                <label class="form-label">Importance (1–5)</label>
                <input type="number" id="newObjImportance" class="form-input" min="1" max="5" value="3">
            </div>
            <div class="form-group">
                <label class="form-label">Échéance</label>
                <input type="date" id="newObjDeadline" class="form-input">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('modalProject')">Annuler</button>
            <button class="btn btn-primary" onclick="submitNewProject()">Créer</button>
        </div>
    </div>
</div>

<!-- ── Modal nouvelle étape ──────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalStep" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Nouvelle étape</span>
            <button class="modal-close" onclick="closeModal('modalStep')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Nom *</label>
                <input type="text" id="newStepName" class="form-input" placeholder="Ex : Billets d'avion">
            </div>
            <div class="form-group">
                <label class="form-label">But</label>
                <input type="text" id="newStepBut" class="form-input" placeholder="Description courte">
            </div>
            <div class="form-group">
                <label class="form-label">Objectif (€) *</label>
                <input type="number" id="newStepTarget" class="form-input" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label class="form-label">Échéance</label>
                <input type="date" id="newStepDeadline" class="form-input">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('modalStep')">Annuler</button>
            <button class="btn btn-primary" onclick="submitNewStep()">Créer</button>
        </div>
    </div>
</div>

<!-- ── Modal liaison transaction ─────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalLink" style="display:none;">
    <div class="modal modal-wide">
        <div class="modal-header">
            <span class="modal-title">Lier une transaction</span>
            <button class="modal-close" onclick="closeModal('modalLink')">✕</button>
        </div>
        <div class="modal-body">

            <!-- Filtres -->
            <div class="link-filters">
                <div class="form-group">
                    <label class="form-label">Compte</label>
                    <select id="linkAccount" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select id="linkTypeFilter" class="form-input">
                        <option value="">Tous</option>
                        <option value="Revenu">Revenus</option>
                        <option value="Depense">Dépenses</option>
                    </select>
                </div>
                <div class="form-group link-search-group">
                    <label class="form-label">Recherche</label>
                    <input type="text" id="linkSearch" class="form-input" placeholder="Intitulé, catégorie…">
                </div>
            </div>

            <!-- Liste des transactions -->
            <div class="link-tx-list" id="linkTxList">
                <div class="link-loading">Chargement…</div>
            </div>

        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('modalLink')">Fermer</button>
        </div>
    </div>
</div>

{% include "_template/bottom.html" %}
<script src="/front_end/objectif/objectif.js"></script>
</body>
</html>
