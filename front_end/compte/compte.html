<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail du Compte</title>
    <!-- global.css : variables CSS + reset -->
    <link rel="stylesheet" href="/front_end/_template/global.css">
    <!-- index.css : tous les composants partagés (.btn, .toolbar, .table-panel, etc.) -->
    <link rel="stylesheet" href="/front_end/index/index.css">
    <!-- compte.css : uniquement les overrides spécifiques à cette page -->
    <link rel="stylesheet" href="/front_end/compte/compte.css">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="topbar-brand">Gestion détaillée</div>
        <select id="accountSelector" class="account-select"></select>
        <span class="topbar-tag">Détail du compte</span>
    </header>

    <main class="main-content">
        <div class="toolbar">
            <span class="toolbar-title">Transactions</span>
            <button class="btn btn-primary" onclick="uiAddRow()">＋ Ajouter</button>
            <button class="btn btn-danger" onclick="deleteSelected()">✕ Supprimer</button>
            <button class="btn btn-ghost" onclick="saveChanges()">💾 Sauvegarder</button>
        </div>

        <div class="table-panel table-panel--scroll">
            <table class="account-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    {% include "_template/bottom.html" %}
</div>
<script src="/front_end/compte/compte.js"></script>
</body>
</html>
