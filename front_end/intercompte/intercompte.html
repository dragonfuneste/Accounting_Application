<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compta — Virements Inter-Comptes</title>
    
    <link rel="stylesheet" href="/front_end/_template/global.css">
    <link rel="stylesheet" href="/front_end/index/index.css">
    <link rel="stylesheet" href="/front_end/intercompte/intercompte.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-brand">Application compte V4</div>
            <span class="topbar-tag">Inter-Comptes</span>
        </header>

        <main class="main-content">
            <div class="transfer-panel">
                <div class="toolbar">
                    <span class="toolbar-title">Virement Inter-Compte</span>
                    <div class="toggle-view">
                        <span class="toggle-label">Point de vue :</span>
                        <button class="btn-toggle active" id="btnTogglePOV">Débiteur</button>
                    </div>
                </div>

                <div class="transfer-form">
                    <div class="form-group">
                        <label for="selectDebiteur">Débiteur (Source)</label>
                        <select id="selectDebiteur" class="form-select">
                            <option value="">Choisir un compte...</option>
                            </select>
                    </div>

                    <div class="transfer-icon">→</div>

                    <div class="form-group">
                        <label for="selectDestinataire">Destinataire (Cible)</label>
                        <select id="selectDestinataire" class="form-select">
                            <option value="">Choisir un compte...</option>
                            </select>
                    </div>

                    <div class="form-group">
                        <label for="transferLabel">Intitulé</label>
                        <input type="text" id="transferLabel" placeholder="Ex: Virement épargne">
                    </div>

                    <div class="form-group">
                        <label id="labelAmountOut">Montant Sortie</label>
                        <input type="number" id="transferAmountOut" step="0.01" placeholder="0.00">
                    </div>

                    <div id="wrapperAmountIn" class="form-group" style="display: none;">
                        <label id="labelAmountIn">Montant Réception</label>
                        <input type="number" id="transferAmountIn" step="0.01" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label for="transferDate">Date</label>
                        <input type="date" id="transferDate">
                    </div>

                    <button class="btn-submit-transfer" id="btnExecuteTransfer">Exécuter</button>
                </div>

                <div class="transfer-chart-container" style="height: 350px; position: relative;">
                    <canvas id="interAccountChart"></canvas>
                </div>
            </div>

        </main>

        {% include "_template/bottom.html" %}
    </div>

    <script src="/front_end/index/index.js"></script> <script src="/front_end/intercompte/intercompte.js"></script>
</body>
</html>
